import com.github.gradle.node.npm.task.NpmTask
import org.gradle.api.tasks.Exec

plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.7'
    id 'io.spring.dependency-management' version '1.1.7'
    id("com.google.osdetector") version "1.7.3"

    // эти два — важно!
    id 'org.owasp.dependencycheck' version '12.1.8'
    id 'com.diffplug.spotless' version '6.25.0'

    id "com.github.node-gradle.node" version "7.0.2"
}

ext {
    springCloudVersion = '2024.0.1'
}

node {
    download = true                                        // <— Gradle скачает свой Node
    version = "22.11.0"
    npmVersion = "10.8.2"
    workDir = file("${buildDir}/node")
    npmWorkDir = file("${buildDir}/npm")
}

group = 'com.crypto.funding'
version = '0.0.1-SNAPSHOT'
description = 'crypto'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    maven { url "https://mvn.mchv.eu/repository/mchv/" }
}

def tdNativesClassifierValue = (project.findProperty("tdNativesClassifier") ?: System.getenv("TD_NATIVES"))?.toString()

def resolveTdClassifier = {
    if (tdNativesClassifierValue != null && !tdNativesClassifierValue.isBlank()) return tdNativesClassifierValue

    def os = osdetector.os
    def arch = osdetector.arch

    if (os == "osx" && arch == "aarch_64") return "macos_arm64"
    if (os == "osx" && arch == "x86_64")   return "macos_amd64"
    if (os == "linux" && arch == "aarch_64") return "linux_arm64_gnu_ssl3"
    if (os == "linux" && arch == "x86_64")  return "linux_amd64_gnu_ssl3"
    if (os == "windows" && arch == "x86_64") return "windows_amd64"

    throw new GradleException("Unsupported TDLight natives for os=${os}, arch=${arch}. Set -PtdNativesClassifier=macos_arm64|linux_amd64|linux_arm64|...")
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'
    implementation 'org.springframework.cloud:spring-cloud-starter-openfeign'
    implementation("com.github.ben-manes.caffeine:caffeine:3.1.8")
    runtimeOnly 'io.micrometer:micrometer-registry-prometheus'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.awaitility:awaitility:4.2.2'
    testImplementation 'org.wiremock:wiremock-standalone:3.0.1'

    // WebSocket клиент (универсальный)
    implementation "org.glassfish.tyrus.bundles:tyrus-standalone-client:$tyrusVersion"

    implementation "org.telegram:telegrambots-spring-boot-starter:6.9.7.1"

    implementation platform('it.tdlight:tdlight-java-bom:3.3.1+td.1.8.25')
    implementation 'it.tdlight:tdlight-java'
    runtimeOnly('it.tdlight:tdlight-natives') {
        artifact { classifier = resolveTdClassifier() }
    }

    //DB
    implementation "org.springframework.boot:spring-boot-starter-data-jpa"
    implementation "org.xerial:sqlite-jdbc:3.46.1.0"
    implementation "org.hibernate.orm:hibernate-community-dialects:6.5.2.Final"

    // JSON
    implementation 'com.fasterxml.jackson.core:jackson-databind'

    // Test
    testImplementation "org.junit.jupiter:junit-jupiter:$junitJupiterVersion"
    testImplementation "org.assertj:assertj-core:$assertjVersion"
    testImplementation "org.mockito:mockito-core:$mockitoVersion"
}

tasks.test { useJUnitPlatform() }

//OWASP Dependency-Check
dependencyCheck {
    failBuildOnCVSS = 7.0
    analyzers.assemblyEnabled = false
}

tasks.register('security') { dependsOn 'dependencyCheckAnalyze' }

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

bootRun { systemProperty 'spring.profiles.active', System.getProperty('spring.profiles.active', 'default') }
