name: CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

jobs:

  # ── 1. Build & Test ──────────────────────────────────────────────────────────
  build:
    name: Build & Test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build & test
        run: ./gradlew clean build --no-daemon

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: app-jars
          path: |
            monitor-app/build/libs/monitor-app-*-monitor.jar
            engine-app/build/libs/engine-app-*-engine.jar
          retention-days: 1

  # ── 2. Engine TDD gate (PR only) ────────────────────────────────────────────
  engine_tdd:
    name: Engine TDD Gate
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - run: chmod +x gradlew

      - name: Run engine TDD gate
        run: ./gradlew engineTddGate --no-daemon

  # ── 3. Security scan (scheduled + manual) ───────────────────────────────────
  security:
    name: Security Scan
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - run: chmod +x gradlew

      - name: Run dependency scan
        run: ./gradlew security --no-daemon

  # ── 4. Docker build & push ───────────────────────────────────────────────────
  docker:
    name: Docker (${{ matrix.app.image_suffix }})
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: crypto
    strategy:
      matrix:
        app:
          - module: monitor-app
            classifier: monitor
            image_suffix: funding-monitor
            port: 8090
          - module: engine-app
            classifier: engine
            image_suffix: funding-engine
            port: 8091
    steps:
      - uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: app-jars
          path: .

      - name: Restore JAR paths
        run: |
          mkdir -p ${{ matrix.app.module }}/build/libs
          find . -maxdepth 1 -name "${{ matrix.app.module }}-*-${{ matrix.app.classifier }}.jar" \
            -exec mv {} ${{ matrix.app.module }}/build/libs/ \;

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            APP_MODULE=${{ matrix.app.module }}
            APP_CLASSIFIER=${{ matrix.app.classifier }}
            APP_PORT=${{ matrix.app.port }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.app.image_suffix }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.app.image_suffix }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Deploy → staging (Mac mini) ──────────────────────────────────────────
  # Builds natively on arm64 Mac mini — no QEMU, no DockerHub pull needed.
  # Depends on `build` (not `docker`) so it runs in parallel with Docker push.
  deploy-staging:
    name: Deploy → Staging (Mac mini)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [ self-hosted, mac-mini, staging ]
    environment: staging
    env:
      PROJECT_DIR: /Volumes/DevDisk/dev/projects/crypto
    steps:
      - name: Pull latest code
        run: |
          cd ${{ env.PROJECT_DIR }}
          git pull origin main

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: app-jars
          path: ${{ env.PROJECT_DIR }}

      - name: Restore JAR paths
        run: |
          cd ${{ env.PROJECT_DIR }}
          mkdir -p monitor-app/build/libs engine-app/build/libs
          find . -maxdepth 1 -name "monitor-app-*-monitor.jar" -exec mv {} monitor-app/build/libs/ \;
          find . -maxdepth 1 -name "engine-app-*-engine.jar" -exec mv {} engine-app/build/libs/ \;

      - name: Ensure .env exists
        run: touch ${{ env.PROJECT_DIR }}/.env

      - name: Build images locally
        run: |
          cd ${{ env.PROJECT_DIR }}
          docker build --build-arg APP_MODULE=monitor-app --build-arg APP_CLASSIFIER=monitor --build-arg APP_PORT=8090 \
            -t funding-monitor:staging .
          docker build --build-arg APP_MODULE=engine-app --build-arg APP_CLASSIFIER=engine --build-arg APP_PORT=8091 \
            -t funding-engine:staging .

      - name: Restart services
        run: |
          cd ${{ env.PROJECT_DIR }}
          IMAGE_MONITOR=funding-monitor:staging \
          IMAGE_ENGINE=funding-engine:staging \
          docker compose up -d --remove-orphans monitor engine

      - name: Smoke test
        run: |
          sleep 15
          curl -f http://localhost:8090/actuator/health
          curl -f http://localhost:8091/actuator/health

  # ── 6. Deploy → production (VPS) ────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Production (VPS)
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Not yet configured
        run: echo "VPS not provisioned yet — add VPS_HOST, VPS_USER, VPS_SSH_KEY secrets to enable"
