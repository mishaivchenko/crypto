name: Error Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC = 09:00 Kyiv
  workflow_dispatch:       # manual trigger for testing

jobs:
  monitor:
    runs-on: [self-hosted, mac-mini, staging]
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run error monitor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/error-monitor.sh scripts/deepseek.sh
          bash scripts/error-monitor.sh
