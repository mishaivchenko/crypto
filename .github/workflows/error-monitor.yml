name: Error Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC = 09:00 Kyiv
  workflow_dispatch:       # manual trigger for testing

jobs:
  monitor:
    name: Daily Docker Log Analysis
    runs-on: [self-hosted, mac-mini, staging]
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Add Homebrew to PATH
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: python3 -m unittest discover -s scripts/tests -p "test_*.py" -v

      - name: Run error monitor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/error_monitor/main.py
