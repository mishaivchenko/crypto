spring:
    config:
        activate:
            on-profile: staging

security:
    operators:
        auth-enabled: true
    cloudflare:
        team-domain: ${CLOUDFLARE_TEAM_DOMAIN}
        audience: ${CLOUDFLARE_AUD}

credentials:
    storage:
        enabled: true
        require-master-key-on-startup: true

monitor:
    engine-metrics:
        enabled: true

trading:
    metadata:
        require-credentials-on-startup: false
