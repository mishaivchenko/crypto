spring:
  datasource:
    url: jdbc:sqlite:./build/test-db.sqlite
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  cloud:
    compatibility-verifier:
      enabled: false

telegram:
  bot:
    enabled: false
    username: dummy
    token: dummy

trading:
  candidates:
    dedupe-window-minutes: 15
  candidate-source:
    enabled: false
  metadata:
    enabled-venues:
      - binance
      - bybit
      - gate
    sync-on-startup: false
    schedule-enabled: false
    require-credentials-on-startup: false
    bootstrap-fallback-enabled: true
  http:
    connect-timeout-ms: 100
    request-timeout-ms: 100
    prefer-http2: false
  execution:
    mode: DISABLED
    legacy-enabled: false
    live-venues: []
    blocked-venues:
      - gate
