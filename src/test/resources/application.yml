spring:
  datasource:
    url: jdbc:sqlite:./build/test-db.sqlite
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  cloud:
    compatibility-verifier:
      enabled: false

telegram:
  enabled: false
  sessionDir: ./build/tdlib
  bot:
    username: dummy
    token: dummy

trading:
  execution:
    mode: DISABLED
    legacy-enabled: false
    live-venues: []
    blocked-venues:
      - gate
