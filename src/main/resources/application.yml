server:
    port: 8090
    #address: 127.0.0.1

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus


telegram:
    apiId: ${TG_API_ID}
    apiHash: ${TG_API_HASH}
    phoneNumber: ${TG_PHONE}
    #password: ${TG_2FA_PASSWORD:}
    sessionDir: ${TG_SESSION_DIR:./data/tdlib}
    systemLanguageCode: uk
    deviceModel: "Java21-Arb"
    appVersion: "0.1.0"

    bot:
        username: ${TG_BOT_USERNAME}
        token: ${TG_BOT_TOKEN}

arb:
    watchlist:
        defaultTtlMinutes: 45
    spread:
        minSpreadPct: 3.0
    funding:
        restFallbackSeconds: 60

funding:
    latency-probe:
        enabled: false
    execution-delay-seconds: 0
    refresh-interval-seconds: 60
    scheduler:
        lookahead-seconds: 10
        min-recheck-millis: 1000
        max-lateness-seconds: 120
        discovery-interval-seconds: 15
#    telegram:
#        channel: @funding_watchdog
spring:
    cloud:
        compatibility-verifier:
            enabled: false
    web:
        resources:
            cache:
                period: 0
            chain:
                cache: false
    datasource:
        url: jdbc:sqlite:./data/fundingarb.db?busy_timeout=5000&journal_mode=WAL
        driver-class-name: org.sqlite.JDBC
        hikari:
            maximum-pool-size: 1
            connection-init-sql: |
                PRAGMA journal_mode=WAL;
                PRAGMA busy_timeout=5000;
                PRAGMA synchronous=NORMAL;
                PRAGMA foreign_keys=ON;
    jpa:
        hibernate:
            ddl-auto: update   # временно можно поставить create
        properties:
            hibernate:
                dialect: org.hibernate.community.dialect.SQLiteDialect
        show-sql: false

trading:
    candidates:
        dedupe-window-minutes: ${TRADING_CANDIDATES_DEDUPE_WINDOW_MINUTES:15}
    metadata:
        enabled-venues: ${TRADING_METADATA_ENABLED_VENUES:binance,bybit,gate}
        sync-on-startup: ${TRADING_METADATA_SYNC_ON_STARTUP:true}
        schedule-enabled: ${TRADING_METADATA_SCHEDULE_ENABLED:false}
        sync-interval-minutes: ${TRADING_METADATA_SYNC_INTERVAL_MINUTES:240}
        require-credentials-on-startup: ${TRADING_METADATA_REQUIRE_CREDENTIALS_ON_STARTUP:true}
        bootstrap-fallback-enabled: ${TRADING_METADATA_BOOTSTRAP_FALLBACK_ENABLED:false}
    http:
        connect-timeout-ms: ${TRADING_HTTP_CONNECT_TIMEOUT_MS:1000}
        request-timeout-ms: ${TRADING_HTTP_REQUEST_TIMEOUT_MS:5000}
        prefer-http2: ${TRADING_HTTP_PREFER_HTTP2:true}
    execution:
        mode: ${TRADING_EXECUTION_MODE:DISABLED}
        legacy-enabled: ${TRADING_LEGACY_EXECUTION_ENABLED:false}
        live-venues: ${TRADING_LIVE_VENUES:}
        blocked-venues: ${TRADING_BLOCKED_VENUES:gate}
    binance:
        mode: ${BINANCE_MODE:testnet}
        recv-window: 5000
        testnet:
            # для USDT-маржинальных фьючерсов testnet:
            # можно использовать demo-fapi.binance.com или testnet.binancefuture.com
            base-url: ${BINANCE_TESTNET_BASE_URL:https://testnet.binancefuture.com}
            api-key: ${BINANCE_TESTNET_API_KEY:}
            secret-key: ${BINANCE_TESTNET_SECRET_KEY:}
        production:
            base-url: ${BINANCE_PROD_BASE_URL:https://fapi.binance.com}
            api-key: ${BINANCE_PROD_API_KEY:}
            secret-key: ${BINANCE_PROD_SECRET_KEY:}

    bybit:
        mode: ${BYBIT_MODE:testnet}
        recv-window: 5000
        testnet:
            base-url: ${BYBIT_TESTNET_BASE_URL:https://api-testnet.bybit.com}
            api-key: ${BYBIT_TESTNET_API_KEY:}
            secret-key: ${BYBIT_TESTNET_SECRET_KEY:}
        production:
            base-url: ${BYBIT_PROD_BASE_URL:https://api.bybit.com}
            api-key: ${BYBIT_PROD_API_KEY:}
            secret-key: ${BYBIT_PROD_SECRET_KEY:}

    gate:
        mode: ${GATE_MODE:testnet}
        recv-window: 5000
        # публичные ручки для контрактов/фандинга берём с прода, т.к. тестнет периодически отдаёт 502
        contracts-base-url: ${GATE_CONTRACTS_BASE_URL:https://fx-api.gateio.ws/api/v4}
        testnet:
            base-url: ${GATE_TESTNET_BASE_URL:https://fx-api-testnet.gateio.ws/api/v4}
            api-key: ${GATE_TESTNET_API_KEY:}
            secret-key: ${GATE_TESTNET_SECRET_KEY:}
        production:
            base-url: ${GATE_PROD_BASE_URL:https://api.gateio.ws/api/v4}
            api-key: ${GATE_PROD_API_KEY:}
            secret-key: ${GATE_PROD_SECRET_KEY:}
