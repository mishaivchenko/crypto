services:
    monitor:
        image: ${IMAGE_MONITOR:-funding-monitor:2.0.0}
        container_name: funding-monitor
        env_file:
            - .env
        environment:
            SERVER_PORT: 8090
            MONITOR_SERVER_PORT: 8090
            SPRING_PROFILES_ACTIVE: prod-like
            SPRING_DATASOURCE_URL: jdbc:sqlite:/data/fundingarb.db
            MONITOR_ENGINE_CONTROL_BASE_URL: http://engine:8091
            MONITOR_ENGINE_CONTROL_INTERNAL_TOKEN: ${INTERNAL_ENGINE_TOKEN:-}
            MONITOR_ENGINE_METRICS_ENABLED: "true"
            MONITOR_DEV_TEST_TOOL_ENABLED: ${MONITOR_DEV_TEST_TOOL_ENABLED:-false}
            MONITOR_DEV_TEST_MAX_NOTIONAL_USD: ${MONITOR_DEV_TEST_MAX_NOTIONAL_USD:-25}
            MONITOR_DEV_TEST_ENABLED_VENUES: ${MONITOR_DEV_TEST_ENABLED_VENUES:-bybit,gate}
            GATE_TESTNET_BASE_URL: ${GATE_TESTNET_BASE_URL:-https://api-testnet.gateapi.io/api/v4}
            GATE_CONTRACTS_BASE_URL: ${GATE_CONTRACTS_BASE_URL:-https://api-testnet.gateapi.io/api/v4}
            TRADING_BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
            TRADING_BYBIT_TESTNET_SECRET_KEY: ${BYBIT_TESTNET_SECRET_KEY:-}
            TRADING_GATE_TESTNET_API_KEY: ${GATE_TESTNET_API_KEY:-}
            TRADING_GATE_TESTNET_SECRET_KEY: ${GATE_TESTNET_SECRET_KEY:-}
        ports:
            - "${MONITOR_SERVER_PORT:-8090}:8090"
        volumes:
            - ./data/monitor:/data
        restart: unless-stopped

    engine:
        image: ${IMAGE_ENGINE:-funding-engine:2.0.0}
        container_name: funding-engine
        env_file:
            - .env
        environment:
            SERVER_PORT: 8091
            ENGINE_SERVER_PORT: 8091
            SPRING_PROFILES_ACTIVE: prod-like
            MONITOR_INTERNAL_BASE_URL: http://monitor:8090
            ENGINE_EXECUTION_LOOP_ENABLED: ${ENGINE_EXECUTION_LOOP_ENABLED:-false}
            ENGINE_LIVE_ORDER_ENABLED: ${ENGINE_LIVE_ORDER_ENABLED:-false}
            ENGINE_KILL_SWITCH_ENABLED: ${ENGINE_KILL_SWITCH_ENABLED:-true}
            ENGINE_LIVE_ENABLED_VENUES: ${ENGINE_LIVE_ENABLED_VENUES:-bybit,gate}
            ENGINE_MAX_NOTIONAL_USD: ${ENGINE_MAX_NOTIONAL_USD:-25}
            ENGINE_METRICS_PUBLISH_ENABLED: "true"
            ENGINE_METRICS_PUBLISH_INTERVAL_MS: 5000
            GATE_TESTNET_BASE_URL: ${GATE_TESTNET_BASE_URL:-https://api-testnet.gateapi.io/api/v4}
        ports:
            - "${ENGINE_SERVER_PORT:-8091}:8091"
        depends_on:
            - monitor
        restart: unless-stopped

    telegram-bot:
        image: ${IMAGE_TELEGRAM_BOT:-funding-telegram-bot:2.0.0}
        container_name: funding-telegram-bot
        env_file:
            - .env
        environment:
            SPRING_PROFILES_ACTIVE: staging
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
            TELEGRAM_NOTIFICATION_CHAT_ID: ${TELEGRAM_NOTIFICATION_CHAT_ID:-}
            TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
            TELEGRAM_SIGNAL_POLL_INTERVAL_MS: ${TELEGRAM_SIGNAL_POLL_INTERVAL_MS:-30000}
            MONITOR_BASE_URL: http://monitor:8090
            MONITOR_OPERATOR_TOKEN: ${MONITOR_OPERATOR_TOKEN:-}
            NGROK_API_URL: ${NGROK_API_URL:-http://host.docker.internal:4040}
            NGROK_ENABLED: "true"
        depends_on:
            - monitor
        restart: unless-stopped
