services:
    monitor:
        build:
            context: ../..
            dockerfile: Dockerfile
            args:
                APP_MODULE: monitor-app
                APP_CLASSIFIER: monitor
                APP_PORT: 8090
        container_name: funding-observability-monitor
        env_file:
            - .env.observability
        environment:
            MONITOR_SERVER_PORT: 8090
            SPRING_DATASOURCE_URL: jdbc:sqlite:/data/observability.db
            SECURITY_OPERATOR_AUTH_ENABLED: "false"
            CREDENTIALS_STORAGE_ENABLED: "false"
            TRADING_CANDIDATE_SOURCE_ENABLED: "true"
            TRADING_METADATA_SYNC_ON_STARTUP: "true"
            TRADING_METADATA_REQUIRE_CREDENTIALS_ON_STARTUP: "false"
            MONITOR_ENGINE_METRICS_ENABLED: "true"
            MANAGEMENT_METRICS_DISTRIBUTION_SLO_HTTP_SERVER_REQUESTS: "50ms,100ms,250ms,500ms,1s,2s,5s"
        ports:
            - "${OBS_MONITOR_PORT:-18090}:8090"
        volumes:
            - funding_observability_monitor_data:/data
        networks:
            - funding-observability
        restart: unless-stopped

    engine:
        build:
            context: ../..
            dockerfile: Dockerfile
            args:
                APP_MODULE: engine-app
                APP_CLASSIFIER: engine
                APP_PORT: 8091
        container_name: funding-observability-engine
        env_file:
            - .env.observability
        environment:
            ENGINE_SERVER_PORT: 8091
            MONITOR_INTERNAL_BASE_URL: http://monitor:8090
            ENGINE_EXECUTION_LOOP_ENABLED: "false"
            ENGINE_METRICS_PUBLISH_ENABLED: "true"
            ENGINE_METRICS_PUBLISH_INTERVAL_MS: 5000
        ports:
            - "${OBS_ENGINE_PORT:-18091}:8091"
        depends_on:
            - monitor
        networks:
            - funding-observability
        restart: unless-stopped

    prometheus:
        image: prom/prometheus:v2.54.1
        container_name: funding-observability-prometheus
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
        ports:
            - "${OBS_PROMETHEUS_PORT:-19090}:9090"
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - funding_observability_prometheus_data:/prometheus
        depends_on:
            - monitor
        networks:
            - funding-observability
        restart: unless-stopped

    grafana:
        image: grafana/grafana:11.2.0
        container_name: funding-observability-grafana
        env_file:
            - .env.observability
        environment:
            GF_USERS_ALLOW_SIGN_UP: "false"
        ports:
            - "${OBS_GRAFANA_PORT:-13000}:3000"
        volumes:
            - ./grafana/provisioning:/etc/grafana/provisioning:ro
            - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
            - funding_observability_grafana_data:/var/lib/grafana
        depends_on:
            - prometheus
        networks:
            - funding-observability
        restart: unless-stopped

volumes:
    funding_observability_monitor_data:
    funding_observability_prometheus_data:
    funding_observability_grafana_data:

networks:
    funding-observability:
        name: funding-observability-net
