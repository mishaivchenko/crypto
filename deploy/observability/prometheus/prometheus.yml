global:
    scrape_interval: 5s
    evaluation_interval: 5s

scrape_configs:
    - job_name: funding-monitor
      metrics_path: /actuator/prometheus
      static_configs:
          - targets:
                - monitor:8090
    - job_name: funding-main-monitor
      metrics_path: /actuator/prometheus
      static_configs:
          - targets:
                - host.docker.internal:8090
