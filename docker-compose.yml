services:
    monitor:
        image: ${IMAGE_MONITOR:-funding-monitor:local}
        build:
            context: .
            dockerfile: Dockerfile
            args:
                APP_MODULE: monitor-app
                APP_CLASSIFIER: monitor
                APP_PORT: 8090
        container_name: funding-monitor
        env_file:
            - .env
        environment:
            SERVER_PORT: 8090
            MONITOR_SERVER_PORT: 8090
            SPRING_DATASOURCE_URL: jdbc:sqlite:/data/fundingarb.db
            SECURITY_OPERATOR_BOOTSTRAP_USERS: ${SECURITY_OPERATOR_BOOTSTRAP_USERS:-operator:funding-local-operator-token}
            INTERNAL_ENGINE_TOKEN: ${INTERNAL_ENGINE_TOKEN:-funding-local-internal-token}
            MONITOR_ENGINE_CONTROL_BASE_URL: http://engine:8091
            MONITOR_ENGINE_CONTROL_INTERNAL_TOKEN: ${INTERNAL_ENGINE_TOKEN:-funding-local-internal-token}
            MONITOR_ENGINE_METRICS_ENABLED: "true"
            MONITOR_DEV_TEST_TOOL_ENABLED: ${MONITOR_DEV_TEST_TOOL_ENABLED:-false}
            MONITOR_DEV_TEST_MAX_NOTIONAL_USD: ${MONITOR_DEV_TEST_MAX_NOTIONAL_USD:-25}
            MONITOR_DEV_TEST_ENABLED_VENUES: ${MONITOR_DEV_TEST_ENABLED_VENUES:-bybit,gate}
            TRADING_VENUE_ACCESS_MODE: ${TRADING_VENUE_ACCESS_MODE:-testnet}
            TRADING_METADATA_SYNC_ON_STARTUP: ${TRADING_METADATA_SYNC_ON_STARTUP:-true}
            TRADING_METADATA_SCHEDULE_ENABLED: ${TRADING_METADATA_SCHEDULE_ENABLED:-true}
            TRADING_METADATA_REQUIRE_CREDENTIALS_ON_STARTUP: ${TRADING_METADATA_REQUIRE_CREDENTIALS_ON_STARTUP:-false}
            BYBIT_METADATA_BASE_URL: ${BYBIT_METADATA_BASE_URL:-https://api-testnet.bybit.com}
            GATE_TESTNET_BASE_URL: ${GATE_TESTNET_BASE_URL:-https://api-testnet.gateapi.io/api/v4}
            GATE_CONTRACTS_BASE_URL: ${GATE_CONTRACTS_BASE_URL:-https://api-testnet.gateapi.io/api/v4}
            BYBIT_MODE: ${BYBIT_MODE:-testnet}
            GATE_MODE: ${GATE_MODE:-testnet}
            TRADING_BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
            TRADING_BYBIT_TESTNET_SECRET_KEY: ${BYBIT_TESTNET_SECRET_KEY:-}
            TRADING_GATE_TESTNET_API_KEY: ${GATE_TESTNET_API_KEY:-}
            TRADING_GATE_TESTNET_SECRET_KEY: ${GATE_TESTNET_SECRET_KEY:-}
            TRADING_OKX_TESTNET_API_KEY: ${OKX_TESTNET_API_KEY:-}
            TRADING_OKX_TESTNET_SECRET_KEY: ${OKX_TESTNET_SECRET_KEY:-}
            TRADING_OKX_TESTNET_PASSPHRASE: ${OKX_TESTNET_PASSPHRASE:-}
            TRADING_OKX_PRODUCTION_API_KEY: ${OKX_PRODUCTION_API_KEY:-}
            TRADING_OKX_PRODUCTION_SECRET_KEY: ${OKX_PRODUCTION_SECRET_KEY:-}
            TRADING_OKX_PRODUCTION_PASSPHRASE: ${OKX_PRODUCTION_PASSPHRASE:-}
            TRADING_KUCOIN_TESTNET_API_KEY: ${KUCOIN_TESTNET_API_KEY:-}
            TRADING_KUCOIN_TESTNET_SECRET_KEY: ${KUCOIN_TESTNET_SECRET_KEY:-}
            TRADING_KUCOIN_TESTNET_PASSPHRASE: ${KUCOIN_TESTNET_PASSPHRASE:-}
            TRADING_KUCOIN_PRODUCTION_API_KEY: ${KUCOIN_PRODUCTION_API_KEY:-}
            TRADING_KUCOIN_PRODUCTION_SECRET_KEY: ${KUCOIN_PRODUCTION_SECRET_KEY:-}
            TRADING_KUCOIN_PRODUCTION_PASSPHRASE: ${KUCOIN_PRODUCTION_PASSPHRASE:-}
            TRADING_BITGET_TESTNET_API_KEY: ${BITGET_TESTNET_API_KEY:-}
            TRADING_BITGET_TESTNET_SECRET_KEY: ${BITGET_TESTNET_SECRET_KEY:-}
            TRADING_BITGET_TESTNET_PASSPHRASE: ${BITGET_TESTNET_PASSPHRASE:-}
            TRADING_BITGET_PRODUCTION_API_KEY: ${BITGET_PRODUCTION_API_KEY:-}
            TRADING_BITGET_PRODUCTION_SECRET_KEY: ${BITGET_PRODUCTION_SECRET_KEY:-}
            TRADING_BITGET_PRODUCTION_PASSPHRASE: ${BITGET_PRODUCTION_PASSPHRASE:-}
        ports:
            - "${MONITOR_SERVER_PORT:-8090}:8090"
        volumes:
            - ./data-container/monitor:/data
        restart: unless-stopped

    engine:
        image: ${IMAGE_ENGINE:-funding-engine:local}
        build:
            context: .
            dockerfile: Dockerfile
            args:
                APP_MODULE: engine-app
                APP_CLASSIFIER: engine
                APP_PORT: 8091
        container_name: funding-engine
        env_file:
            - .env
        environment:
            SERVER_PORT: 8091
            ENGINE_SERVER_PORT: 8091
            MONITOR_INTERNAL_BASE_URL: http://monitor:8090
            INTERNAL_ENGINE_TOKEN: ${INTERNAL_ENGINE_TOKEN:-funding-local-internal-token}
            ENGINE_EXECUTION_LOOP_ENABLED: ${ENGINE_EXECUTION_LOOP_ENABLED:-false}
            ENGINE_LIVE_ORDER_ENABLED: ${ENGINE_LIVE_ORDER_ENABLED:-false}
            ENGINE_KILL_SWITCH_ENABLED: ${ENGINE_KILL_SWITCH_ENABLED:-true}
            ENGINE_LIVE_ENABLED_VENUES: ${ENGINE_LIVE_ENABLED_VENUES:-bybit,gate}
            ENGINE_MAX_NOTIONAL_USD: ${ENGINE_MAX_NOTIONAL_USD:-25}
            ENGINE_METRICS_PUBLISH_ENABLED: "true"
            ENGINE_METRICS_PUBLISH_INTERVAL_MS: 5000
            TRADING_VENUE_ACCESS_MODE: ${TRADING_VENUE_ACCESS_MODE:-testnet}
            BYBIT_MODE: ${BYBIT_MODE:-testnet}
            GATE_MODE: ${GATE_MODE:-testnet}
            GATE_TESTNET_BASE_URL: ${GATE_TESTNET_BASE_URL:-https://api-testnet.gateapi.io/api/v4}
            ENGINE_CREDENTIALS_BYBIT_API_KEY: ${ENGINE_CREDENTIALS_BYBIT_API_KEY:-${BYBIT_TESTNET_API_KEY:-}}
            ENGINE_CREDENTIALS_BYBIT_SECRET_KEY: ${ENGINE_CREDENTIALS_BYBIT_SECRET_KEY:-${BYBIT_TESTNET_SECRET_KEY:-}}
            ENGINE_CREDENTIALS_GATE_API_KEY: ${ENGINE_CREDENTIALS_GATE_API_KEY:-${GATE_TESTNET_API_KEY:-}}
            ENGINE_CREDENTIALS_GATE_SECRET_KEY: ${ENGINE_CREDENTIALS_GATE_SECRET_KEY:-${GATE_TESTNET_SECRET_KEY:-}}
            ENGINE_CREDENTIALS_OKX_API_KEY: ${ENGINE_CREDENTIALS_OKX_API_KEY:-${OKX_TESTNET_API_KEY:-}}
            ENGINE_CREDENTIALS_OKX_SECRET_KEY: ${ENGINE_CREDENTIALS_OKX_SECRET_KEY:-${OKX_TESTNET_SECRET_KEY:-}}
            ENGINE_CREDENTIALS_OKX_PASSPHRASE: ${ENGINE_CREDENTIALS_OKX_PASSPHRASE:-${OKX_TESTNET_PASSPHRASE:-}}
            ENGINE_CREDENTIALS_KUCOIN_API_KEY: ${ENGINE_CREDENTIALS_KUCOIN_API_KEY:-${KUCOIN_TESTNET_API_KEY:-}}
            ENGINE_CREDENTIALS_KUCOIN_SECRET_KEY: ${ENGINE_CREDENTIALS_KUCOIN_SECRET_KEY:-${KUCOIN_TESTNET_SECRET_KEY:-}}
            ENGINE_CREDENTIALS_KUCOIN_PASSPHRASE: ${ENGINE_CREDENTIALS_KUCOIN_PASSPHRASE:-${KUCOIN_TESTNET_PASSPHRASE:-}}
            ENGINE_CREDENTIALS_BITGET_API_KEY: ${ENGINE_CREDENTIALS_BITGET_API_KEY:-${BITGET_TESTNET_API_KEY:-}}
            ENGINE_CREDENTIALS_BITGET_SECRET_KEY: ${ENGINE_CREDENTIALS_BITGET_SECRET_KEY:-${BITGET_TESTNET_SECRET_KEY:-}}
            ENGINE_CREDENTIALS_BITGET_PASSPHRASE: ${ENGINE_CREDENTIALS_BITGET_PASSPHRASE:-${BITGET_TESTNET_PASSPHRASE:-}}
        ports:
            - "${ENGINE_SERVER_PORT:-8091}:8091"
        depends_on:
            - monitor
        restart: unless-stopped

    prometheus:
        image: prom/prometheus:v2.54.1
        container_name: funding-prometheus
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "${PROMETHEUS_PORT:-9090}:9090"
        volumes:
            - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
        depends_on:
            - monitor
        restart: unless-stopped

    grafana:
        image: grafana/grafana:11.2.0
        container_name: funding-grafana
        environment:
            GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
            GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
            GF_USERS_ALLOW_SIGN_UP: "false"
        ports:
            - "${GRAFANA_PORT:-3000}:3000"
        volumes:
            - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana-data:/var/lib/grafana
        depends_on:
            - prometheus
        restart: unless-stopped

volumes:
    prometheus-data:
    grafana-data:
